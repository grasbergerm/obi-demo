# Phase 2 of the demo: the same backend Deployment, now running the
# SDK-instrumented build. Applying this over k8s/demo-app.yaml replaces the
# uninstrumented image and points the SDK at the OTLP endpoint.
#
# OBI stays exactly as it is. It will *behaviorally* detect that this process
# successfully exports OTLP traces (it sees the export calls with its own
# probes) and stop emitting its own traces for it, while continuing to emit
# span metrics and service-graph metrics.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: obi-demo/backend:v2-sdk
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: OTEL_SERVICE_NAME
              value: backend
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://lgtm.observability.svc.cluster.local:4317
