# grafana/otel-lgtm: an all-in-one observability backend for demos.
# One pod containing Grafana, Tempo (traces), Prometheus (metrics), Loki (logs)
# and an OTel Collector wired between them. OTLP in, dashboards out.
apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      containers:
        - name: lgtm
          image: grafana/otel-lgtm:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grafana
              containerPort: 3000
            - name: otlp-grpc
              containerPort: 4317
          env:
            # Make the provisioned demo dashboard Grafana's landing page.
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/obi-demo.json
          volumeMounts:
            - name: demo-dashboard
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml
              subPath: provider.yaml
            - name: demo-dashboard
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/obi-demo.json
              subPath: obi-demo.json
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
      volumes:
        # Created by scripts/02-observability.sh from k8s/grafana-dashboard*.
        - name: demo-dashboard
          configMap:
            name: grafana-demo-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: lgtm
  namespace: observability
spec:
  selector:
    app: lgtm
  ports:
    - name: grafana
      port: 3000
    - name: otlp-grpc
      port: 4317
    - name: tempo-http
      port: 3200
    - name: prometheus
      port: 9090
